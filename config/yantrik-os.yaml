# Yantrik OS — Device Configuration
# Deploy to /opt/yantrik/config.yaml on the device / VM.
#
# Single-binary mode: LLM + embeddings run in-process via Candle.
# No external servers, no cloud, no network calls.

user_name: "Pranab"

personality:
  name: "Yantrik"
  system_prompt: >
    You are Yantrik, a personal AI companion running as the desktop shell
    on Pranab's computer. You remember everything he tells you. You are
    warm, thoughtful, and occasionally curious. You speak concisely.
    When you notice patterns or have concerns, you bring them up naturally.
    You never fabricate memories — if you don't know, say so.
    You can see system events (battery, network, files, processes)
    and proactively help when something needs attention.

# LLM configuration.
#
# Backend options:
#   In-process:  candle (default), llamacpp
#   API servers:  ollama, openai, deepseek, claude, vllm, api (generic)
#
# For API backends, set api_model (required) and api_key (if needed).
# api_base_url is auto-resolved for named providers (ollama, openai, deepseek, claude).
# For vllm/api, set api_base_url explicitly.
llm:
  backend: "candle"
  # API backend settings (uncomment to use):
  # api_base_url: "http://localhost:11434/v1"  # auto-resolved for named providers
  # api_model: "qwen2.5:3b-instruct-q4_K_M"
  # api_key: null
  model_dir: "/opt/yantrik/models/llm"
  hub_repo: "Qwen/Qwen2.5-3B-Instruct-GGUF"
  hub_gguf: "qwen2.5-3b-instruct-q4_k_m.gguf"
  hub_tokenizer: "Qwen/Qwen2.5-3B-Instruct"
  max_tokens: 512
  temperature: 0.7
  max_context_tokens: 4096

# REST API (for debug / external clients)
server:
  host: "0.0.0.0"
  port: 8340

# YantrikDB memory engine
yantrikdb:
  db_path: "/opt/yantrik/data/memory.db"
  embedding_dim: 384
  # Local embedder model directory (contains model files)
  # If omitted, downloads all-MiniLM-L6-v2 from HuggingFace on first run.
  embedder_model_dir: "/opt/yantrik/models/embedder"

conversation:
  max_history_turns: 10
  session_timeout_minutes: 30

# Tool calling — enabled for 3B model (reliable tool use).
# max_permission: safe | standard | sensitive | dangerous
# Default "sensitive" allows everything except destructive ops (file delete, shutdown).
tools:
  enabled: true
  max_tool_rounds: 3
  max_permission: "sensitive"

cognition:
  think_interval_minutes: 15
  think_interval_active_minutes: 5
  idle_think_interval_minutes: 30
  proactive_urgency_threshold: 0.7

instincts:
  check_in_enabled: true
  check_in_hours: 8.0
  emotional_awareness_enabled: true
  follow_up_enabled: true
  follow_up_min_hours: 4.0
  reminder_enabled: true
  pattern_surfacing_enabled: true
  conflict_alerting_enabled: true
  conflict_alert_threshold: 5

urges:
  expiry_hours: 48.0
  max_pending: 20
  boost_increment: 0.1
  cooldown_seconds: 3600.0

bond:
  enabled: true

proactive:
  enabled: true
  delivery_threshold: 0.7    # urgency threshold for auto-delivery
  cooldown_minutes: 30        # min time between proactive messages

evolution:
  formality_alpha: 0.05
  opinion_threshold: 3

narrative:
  update_interval_interactions: 10
  max_tokens: 300

# Memory evolution — V23: smart recall, consolidation, pruning, reference freshness.
memory_evolution:
  smart_recall_enabled: true
  max_extra_recall_calls: 2
  max_recall_memories: 8
  cross_domain_enabled: true
  consolidation_enabled: true
  consolidation_interval_hours: 6
  duplicate_similarity_threshold: 0.85
  reference_freshness_enabled: true
  reference_freshness_half_life_days: 14.0
  variable_halflife_enabled: true
  pruning_interval_hours: 24
  tier_half_lives:
    core: 31536000        # 365 days — identity facts, key relationships
    significant: 5184000  # 60 days — important events, emotional memories
    routine: 604800       # 7 days — default bucket
    ephemeral: 86400      # 1 day — system events, small talk
  weaving_enabled: true           # Proactive memory graph building during idle
  weaving_interval_hours: 2       # Hours between weaving cycles
  weaving_batch_size: 15          # Memories to process per cycle

# System observer — watches battery, network, files, processes.
# Set mock: true for QEMU dev (fakes events on timers).
system:
  mock: false
  watch_dirs:
    - "~/Downloads"
    - "~/Documents"
    - "~/Desktop"
  process_poll_secs: 5
  resource_poll_secs: 10

voice:
  enabled: true
  # Whisper STT — in-process via Candle
  whisper_model: "openai/whisper-tiny"
  whisper_model_dir: "/opt/yantrik/models/whisper"
  # Piper TTS
  piper_voice: "en_US-lessac-medium"
  silence_threshold: 0.01
  silence_duration_ms: 800
