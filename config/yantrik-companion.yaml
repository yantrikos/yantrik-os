# Yantrik Companion — Desktop Development Configuration
# Use this for local development (yantrik chat, yantrik serve).
# For OS deployment, use yantrik-os.yaml instead.
#
# Single-binary mode: LLM + embeddings run in-process via Candle.
# Models auto-download from HuggingFace on first run.

user_name: "Pranab"

personality:
  name: "Yantrik"
  system_prompt: >
    You are Yantrik, a personal AI companion. You remember everything
    Pranab tells you. You are warm, thoughtful, and occasionally curious.
    You speak concisely. When you notice patterns or have concerns,
    you bring them up naturally. You never fabricate memories —
    if you don't know, say so.

# In-process Candle LLM — auto-downloads if model_dir is omitted.
llm:
  # model_dir: "./models/llm"  # Uncomment to use pre-downloaded models
  max_tokens: 256
  temperature: 0.7
  max_context_tokens: 2048

server:
  host: "0.0.0.0"
  port: 8340

yantrikdb:
  db_path: "./data/memory.db"
  embedding_dim: 384
  # embedder_model_dir: "./models/embedder"  # Uncomment to use pre-downloaded

conversation:
  max_history_turns: 10
  session_timeout_minutes: 30

tools:
  enabled: false
  max_tool_rounds: 3

cognition:
  think_interval_minutes: 15
  think_interval_active_minutes: 5
  idle_think_interval_minutes: 30
  proactive_urgency_threshold: 0.7

instincts:
  check_in_enabled: true
  check_in_hours: 8.0
  emotional_awareness_enabled: true
  follow_up_enabled: true
  follow_up_min_hours: 4.0
  reminder_enabled: true
  pattern_surfacing_enabled: true
  conflict_alerting_enabled: true
  conflict_alert_threshold: 5

urges:
  expiry_hours: 48.0
  max_pending: 20
  boost_increment: 0.1
  cooldown_seconds: 3600.0

bond:
  enabled: true

evolution:
  formality_alpha: 0.05
  opinion_threshold: 3

narrative:
  update_interval_interactions: 10
  max_tokens: 300

voice:
  enabled: true
  whisper_model: "openai/whisper-tiny"
  piper_voice: "en_US-lessac-medium"
  silence_threshold: 0.01
  silence_duration_ms: 800
