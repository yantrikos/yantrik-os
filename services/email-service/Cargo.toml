[package]
name = "email-service"
version = "0.1.0"
edition = "2021"
description = "Yantrik email service — IMAP fetch, SMTP send, folder management"

[[bin]]
name = "email-service"
path = "src/main.rs"

[dependencies]
yantrik-ipc-contracts = { workspace = true }
yantrik-service-sdk = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
native-tls = { workspace = true }
imap = { workspace = true }
lettre = { workspace = true, features = ["hostname"] }
mailparse = { workspace = true }
html2text = { workspace = true }
base64 = { workspace = true }
